agent {
  data_dir = "test/e2e/data/spire-agent"
  log_level = "INFO"
  trust_domain = "e2e.test"
  server_address = "127.0.0.1"
  server_port = "8081"
  socket_path = "test/e2e/data/agent.sock"
  join_token = "{{JOIN_TOKEN}}"
}
plugins {
  NodeAttestor "join_token" {
    plugin_data {}
  }
  KeyManager "memory" {
    plugin_data {}
  }
  WorkloadAttestor "unix" {
    plugin_data {}
  }
}
