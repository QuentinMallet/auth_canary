server {
  bind_address = "127.0.0.1"
  bind_port = "8081"
  trust_domain = "e2e.test"
  data_dir = "test/e2e/data/spire-server"
  log_level = "INFO"
  ca_subject {
    country = ["US"]
    organization = ["E2E Test"]
    common_name = ""
  }
}
plugins {
  DataStore "sql" {
    plugin_data {
      database_type = "sqlite3"
      connection_string = "test/e2e/data/spire-server/datastore.sqlite3"
    }
  }
  NodeAttestor "join_token" {
    plugin_data {}
  }
  KeyManager "memory" {
    plugin_data {}
  }
}
